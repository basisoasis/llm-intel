name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build llm-intel
        run: bun run build

      - name: Debug
        run: |
          ls -la dist/
          ls -la docs/node_modules/llm-intel/ || echo "llm-intel not found in docs/node_modules"
          ls -la node_modules/llm-intel/ || echo "llm-intel not found in root node_modules"
          ls -la docs/node_modules/llm-intel/dist/ || echo "no dist via symlink"

      - name: Install docs dependencies
        run: bun install
        working-directory: docs

      - name: Build docs
        run: bun run build
        working-directory: docs
        env:
          VITE_MODEL_URL: ${{ vars.VITE_MODEL_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4